<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
</head>
<body>
<h2>Welcome, User!</h2>
<a href="/add_pet">Add Pet</a> | <a href="/logout">Logout</a>
<h3>Available Pets:</h3>
<ul>
    {% for pet in pets %}
    <li>
        <strong>{{ pet.name }}</strong> - {{ pet.breed }} - {{ pet.age }} yrs - {{ pet.gender }}
        <br>Description: {{ pet.description }}
        <br>Type: {{ pet.type }}
        {% if pet.photo %}
            <br><img src="{{ url_for('static', filename='uploads/' ~ pet.photo) }}" width="100">
        {% endif %}
    </li>
    {% endfor %}
</ul>
</body>
</html>
