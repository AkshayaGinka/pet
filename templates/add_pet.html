<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Pet - PetRescue</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container" style="max-width:500px;">
    <h2>Add a Pet</h2>
    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="name" placeholder="Pet Name" required>
        <input type="text" name="breed" placeholder="Breed" required>
        <input type="number" name="age" placeholder="Age" min="0" max="30" required>
        <input type="text" name="location" placeholder="Location" required>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <input type="text" name="color" placeholder="Color" required>
        <select name="type" required>
            <option value="">Select Type</option>
            <option value="Lost">Lost</option>
            <option value="Found">Found</option>
            <option value="Adoption">Adoption</option>
        </select>
        <input type="text" name="healthy_status" placeholder="Health Status (e.g. Healthy, Sick)" required>
        <textarea name="description" placeholder="Description"></textarea>
        <input type="file" name="photo" accept="image/*">
        <input type="text" name="photo_url" placeholder="Photo URL (optional)">
        <button type="submit">Add Pet</button>
    </form>
    <a href="/user_dashboard">Back to Dashboard</a>
</div>
</body>
</html>
