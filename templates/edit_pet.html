<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Pet - PetRescue</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container" style="max-width:500px;">
    <h2>Edit Pet</h2>
    <form method="POST">
        <input type="text" name="name" value="{{ pet.name }}" placeholder="Pet Name" required>
        <input type="text" name="breed" value="{{ pet.breed }}" placeholder="Breed" required>
        <input type="number" name="age" value="{{ pet.age }}" placeholder="Age" min="0" max="30" required>
        <input type="text" name="location" value="{{ pet.location }}" placeholder="Location" required>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male" {% if pet.gender == 'Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if pet.gender == 'Female' %}selected{% endif %}>Female</option>
        </select>
        <input type="text" name="color" value="{{ pet.color }}" placeholder="Color" required>
        <select name="type" required>
            <option value="Lost" {% if pet.type == 'Lost' %}selected{% endif %}>Lost</option>
            <option value="Found" {% if pet.type == 'Found' %}selected{% endif %}>Found</option>
            <option value="Adoption" {% if pet.type == 'Adoption' %}selected{% endif %}>Adoption</option>
        </select>
        <input type="text" name="healthy_status" value="{{ pet.healthy_status }}" placeholder="Health Status (e.g. Healthy, Sick)" required>
        <textarea name="description" placeholder="Description">{{ pet.description }}</textarea>
        <input type="text" name="photo_url" value="{{ pet.photo_url }}" placeholder="Photo URL (optional)">
        <button type="submit">Update Pet</button>
    </form>
    {% if session.get('admin_id') %}
       <a href="{{ url_for('admin_dashboard') }}">Back to Dashboard</a>
    {% else %}
        <a href="{{ url_for('user_dashboard') }}">Back to Dashboard</a>
{% endif %}
</div>
</body>
</html>
