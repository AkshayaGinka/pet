<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome to PetRescue</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    background: url('{{ url_for('static', filename='images/user_background.jpg') }}') no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.container {
    background: rgba(255,255,255,0.9);
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    width: 380px;
    text-align: center;
    animation: fadeIn 1s ease-in-out;
}

h1 {
    color: #333;
    margin-bottom: 20px;
    font-size: 2rem;
}

input[type="text"], input[type="email"], input[type="password"] {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 90%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #74ebd5;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: #ACB6E5;
}

.quote {
    font-style: italic;
    color: #555;
    margin: 15px 0;
    min-height: 40px;
    font-size: 1rem;
}

.section {
    margin-top: 30px;
}

a {
    color: #333;
    text-decoration: none;
    font-size: 0.9rem;
}
a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
    <h1>Welcome to PetRescue</h1>
    <div class="quote" id="quote">"Saving one animal won't change the world, but it will change the world for that one animal."</div>
    
    <!-- User Login Form -->
    <form method="POST" action="/login_user">
        <input type="email" name="email" placeholder="Email" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <input type="text" name="captcha" placeholder="Enter 1234" required><br>
        <button type="submit">Login as User</button>
    </form>

    <!-- Admin Login Form -->
    <form method="POST" action="/login_admin" style="margin-top:15px;">
        <input type="email" name="email" placeholder="Admin Email" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <input type="text" name="captcha" placeholder="Enter 1234" required><br>
        <button type="submit">Login as Admin</button>
    </form>

    <div class="section">
        <a href="/register">New User? Register</a>
    </div>
</div>

<script>
// Rotating quotes every 3 seconds
const quotes = [
    "\"Saving one animal won't change the world, but it will change the world for that one animal.\"",
    "\"Until one has loved an animal, a part of one's soul remains unawakened.\"",
    "\"Animals are such agreeable friends—they ask no questions; they pass no criticisms.\"",
    "\"Adopting a pet saves two lives — yours and theirs.\""
];
let index = 0;
setInterval(() => {
    document.getElementById('quote').innerText = quotes[index];
    index = (index + 1) % quotes.length;
}, 3000);
</script>

</body>
</html>
